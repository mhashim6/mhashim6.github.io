<svg viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Variant 1: Pine with needle-cluster roots -->
  <!-- Ground line -->
  <path stroke="currentColor" stroke-width="0.6" opacity="0.35" d="M4 100H156"/>

  <!-- Trunk above and below ground -->
  <path fill="currentColor" d="M78 48L78 100H82L82 48C82 44 78 44 78 48Z"/>
  <path fill="currentColor" d="M78 100L78 152H82L82 100Z"/>

  <!-- Bare branches above ground — tiered pine silhouette -->
  <path fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" d="M80 94L46 78M80 94L114 78M80 88L40 72M80 88L120 72M80 80L50 66M80 80L110 66M80 74L44 58M80 74L116 58M80 66L54 52M80 66L106 52M80 60L58 48M80 60L102 48M80 54L66 44M80 54L94 44M80 48L72 38M80 48L88 38M80 42L80 30"/>

  <!-- Twig ends on branches -->
  <path fill="none" stroke="currentColor" stroke-width="0.7" stroke-linecap="round" opacity="0.85" d="M46 78L40 76M46 78L44 82M114 78L120 76M114 78L116 82M40 72L34 70M120 72L126 70M50 66L44 64M110 66L116 64M44 58L38 56M116 58L122 56M54 52L50 50M106 52L110 50M66 44L62 40M94 44L98 40M80 30L76 28M80 30L84 28"/>

  <!-- Roots below ground — mirrored pine tiers, spreading -->
  <path fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" d="M80 106L46 122M80 106L114 122M80 112L40 128M80 112L120 128M80 120L50 134M80 120L110 134M80 126L44 142M80 126L116 142M80 134L54 148M80 134L106 148M80 140L58 152M80 140L102 152M80 146L66 156M80 146L94 156M80 152L72 162M80 152L88 162M80 158L80 170"/>

  <!-- Needle clusters on roots -->
  <g fill="currentColor" opacity="0.85">
    <ellipse cx="44" cy="122" rx="2.5" ry="1.2" transform="rotate(25 44 122)"/>
    <ellipse cx="116" cy="122" rx="2.5" ry="1.2" transform="rotate(-25 116 122)"/>
    <ellipse cx="38" cy="128" rx="2.5" ry="1.2" transform="rotate(30 38 128)"/>
    <ellipse cx="122" cy="128" rx="2.5" ry="1.2" transform="rotate(-30 122 128)"/>
    <ellipse cx="48" cy="134" rx="2.2" ry="1.1" transform="rotate(-15 48 134)"/>
    <ellipse cx="112" cy="134" rx="2.2" ry="1.1" transform="rotate(15 112 134)"/>
    <ellipse cx="42" cy="142" rx="2.2" ry="1.1" transform="rotate(35 42 142)"/>
    <ellipse cx="118" cy="142" rx="2.2" ry="1.1" transform="rotate(-35 118 142)"/>
    <ellipse cx="52" cy="148" rx="2" ry="1" transform="rotate(-20 52 148)"/>
    <ellipse cx="108" cy="148" rx="2" ry="1" transform="rotate(20 108 148)"/>
    <ellipse cx="56" cy="152" rx="2" ry="1" transform="rotate(40 56 152)"/>
    <ellipse cx="104" cy="152" rx="2" ry="1" transform="rotate(-40 104 152)"/>
    <ellipse cx="64" cy="156" rx="1.8" ry="0.9" transform="rotate(-30 64 156)"/>
    <ellipse cx="96" cy="156" rx="1.8" ry="0.9" transform="rotate(30 96 156)"/>
    <ellipse cx="70" cy="162" rx="1.8" ry="0.9" transform="rotate(45 70 162)"/>
    <ellipse cx="90" cy="162" rx="1.8" ry="0.9" transform="rotate(-45 90 162)"/>
    <ellipse cx="80" cy="170" rx="1.5" ry="0.8"/>
  </g>

  <!-- Dense pine needle leaves across all root tiers -->
  <g fill="currentColor" opacity="0.88">
    <!-- top root tier — sparse -->
    <ellipse cx="44" cy="120" rx="3" ry="1.3" transform="rotate(25 44 120)"/>
    <ellipse cx="116" cy="120" rx="3" ry="1.3" transform="rotate(-25 116 120)"/>
    <ellipse cx="50" cy="124" rx="2.8" ry="1.2" transform="rotate(-20 50 124)"/>
    <ellipse cx="110" cy="124" rx="2.8" ry="1.2" transform="rotate(20 110 124)"/>

    <!-- second tier -->
    <ellipse cx="38" cy="126" rx="3" ry="1.3" transform="rotate(30 38 126)"/>
    <ellipse cx="122" cy="126" rx="3" ry="1.3" transform="rotate(-30 122 126)"/>
    <ellipse cx="44" cy="130" rx="2.8" ry="1.2" transform="rotate(-15 44 130)"/>
    <ellipse cx="116" cy="130" rx="2.8" ry="1.2" transform="rotate(15 116 130)"/>

    <!-- third tier — filling in -->
    <ellipse cx="48" cy="132" rx="3" ry="1.3" transform="rotate(35 48 132)"/>
    <ellipse cx="112" cy="132" rx="3" ry="1.3" transform="rotate(-35 112 132)"/>
    <ellipse cx="42" cy="136" rx="2.5" ry="1.2" transform="rotate(-25 42 136)"/>
    <ellipse cx="118" cy="136" rx="2.5" ry="1.2" transform="rotate(25 118 136)"/>
    <ellipse cx="54" cy="138" rx="2.5" ry="1.1" transform="rotate(40 54 138)"/>
    <ellipse cx="106" cy="138" rx="2.5" ry="1.1" transform="rotate(-40 106 138)"/>

    <!-- fourth tier — dense -->
    <ellipse cx="40" cy="140" rx="3" ry="1.3" transform="rotate(20 40 140)"/>
    <ellipse cx="120" cy="140" rx="3" ry="1.3" transform="rotate(-20 120 140)"/>
    <ellipse cx="48" cy="144" rx="2.8" ry="1.2" transform="rotate(-30 48 144)"/>
    <ellipse cx="112" cy="144" rx="2.8" ry="1.2" transform="rotate(30 112 144)"/>
    <ellipse cx="56" cy="142" rx="2.5" ry="1.1" transform="rotate(45 56 142)"/>
    <ellipse cx="104" cy="142" rx="2.5" ry="1.1" transform="rotate(-45 104 142)"/>
    <ellipse cx="64" cy="146" rx="2.2" ry="1" transform="rotate(-35 64 146)"/>
    <ellipse cx="96" cy="146" rx="2.2" ry="1" transform="rotate(35 96 146)"/>

    <!-- fifth tier -->
    <ellipse cx="46" cy="148" rx="2.8" ry="1.2" transform="rotate(15 46 148)"/>
    <ellipse cx="114" cy="148" rx="2.8" ry="1.2" transform="rotate(-15 114 148)"/>
    <ellipse cx="54" cy="150" rx="2.5" ry="1.1" transform="rotate(-40 54 150)"/>
    <ellipse cx="106" cy="150" rx="2.5" ry="1.1" transform="rotate(40 106 150)"/>
    <ellipse cx="62" cy="152" rx="2.2" ry="1" transform="rotate(30 62 152)"/>
    <ellipse cx="98" cy="152" rx="2.2" ry="1" transform="rotate(-30 98 152)"/>
    <ellipse cx="70" cy="150" rx="2" ry="0.9" transform="rotate(-20 70 150)"/>
    <ellipse cx="90" cy="150" rx="2" ry="0.9" transform="rotate(20 90 150)"/>

    <!-- sixth tier — narrowing -->
    <ellipse cx="52" cy="154" rx="2.5" ry="1.1" transform="rotate(25 52 154)"/>
    <ellipse cx="108" cy="154" rx="2.5" ry="1.1" transform="rotate(-25 108 154)"/>
    <ellipse cx="60" cy="156" rx="2.2" ry="1" transform="rotate(-35 60 156)"/>
    <ellipse cx="100" cy="156" rx="2.2" ry="1" transform="rotate(35 100 156)"/>
    <ellipse cx="68" cy="158" rx="2" ry="0.9" transform="rotate(40 68 158)"/>
    <ellipse cx="92" cy="158" rx="2" ry="0.9" transform="rotate(-40 92 158)"/>

    <!-- lower tiers — tapering to point -->
    <ellipse cx="58" cy="160" rx="2" ry="0.9" transform="rotate(20 58 160)"/>
    <ellipse cx="102" cy="160" rx="2" ry="0.9" transform="rotate(-20 102 160)"/>
    <ellipse cx="66" cy="162" rx="2" ry="0.9" transform="rotate(-30 66 162)"/>
    <ellipse cx="94" cy="162" rx="2" ry="0.9" transform="rotate(30 94 162)"/>
    <ellipse cx="74" cy="164" rx="1.8" ry="0.8" transform="rotate(45 74 164)"/>
    <ellipse cx="86" cy="164" rx="1.8" ry="0.8" transform="rotate(-45 86 164)"/>
    <ellipse cx="70" cy="166" rx="1.8" ry="0.8" transform="rotate(-25 70 166)"/>
    <ellipse cx="90" cy="166" rx="1.8" ry="0.8" transform="rotate(25 90 166)"/>
    <ellipse cx="76" cy="168" rx="1.5" ry="0.7" transform="rotate(35 76 168)"/>
    <ellipse cx="84" cy="168" rx="1.5" ry="0.7" transform="rotate(-35 84 168)"/>
    <ellipse cx="80" cy="172" rx="1.5" ry="0.7"/>
  </g>
</svg>
